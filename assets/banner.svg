<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4c3a1a"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="robeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2440"/>
      <stop offset="100%" stop-color="#0f0d1a"/>
    </linearGradient>
    <pattern id="meander" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#0a0e1a"/>
      <path d="M0 6 H10 V0 M10 6 V16 H24 M10 16 H0" fill="none" stroke="#8a6d2f" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1280" height="400" fill="#0a0e1a"/>

  <!-- Greek key border bands -->
  <rect x="0" y="0" width="1280" height="26" fill="url(#meander)"/>
  <rect x="0" y="374" width="1280" height="26" fill="url(#meander)"/>
  <rect x="0" y="0" width="26" height="400" fill="url(#meander)"/>
  <rect x="1254" y="0" width="26" height="400" fill="url(#meander)"/>
  <rect x="26" y="26" width="1228" height="348" fill="none" stroke="#8a6d2f" stroke-width="1.5"/>

  <!-- corner medallions -->
  <g stroke="#8a6d2f" stroke-width="1.5" fill="#0a0e1a">
    <circle cx="70" cy="70" r="34"/>
    <circle cx="1210" cy="70" r="34"/>
    <circle cx="70" cy="330" r="34"/>
    <circle cx="1210" cy="330" r="34"/>
  </g>
  <!-- owl (top-left) -->
  <g fill="#8a6d2f">
    <ellipse cx="70" cy="72" rx="14" ry="16"/>
    <circle cx="64" cy="66" r="4" fill="#0a0e1a"/><circle cx="76" cy="66" r="4" fill="#0a0e1a"/>
    <circle cx="64" cy="66" r="1.6"/><circle cx="76" cy="66" r="1.6"/>
    <path d="M70 70 L66 76 L74 76 Z"/>
  </g>
  <!-- crescent (top-right) -->
  <path d="M1218 55 A18 18 0 1 0 1218 89 A14 14 0 1 1 1218 55 Z" fill="#8a6d2f"/>
  <!-- laurel (bottom-left) -->
  <g stroke="#8a6d2f" stroke-width="2" fill="none">
    <path d="M55 330 Q70 310 70 330 Q70 350 55 330"/>
    <path d="M85 330 Q70 310 70 330 Q70 350 85 330"/>
  </g>
  <!-- shield (bottom-right) -->
  <path d="M1210 312 L1226 320 V336 Q1226 348 1210 354 Q1194 348 1194 336 V320 Z" fill="none" stroke="#8a6d2f" stroke-width="2"/>

  <!-- columns flanking scene -->
  <g fill="#161227" stroke="#5a4a2a" stroke-width="1">
    <rect x="150" y="70" width="34" height="200" />
    <rect x="140" y="60" width="54" height="12"/>
    <rect x="140" y="270" width="54" height="12"/>
    <line x1="158" y1="82" x2="158" y2="270" stroke="#3a3050" stroke-width="1"/>
    <line x1="167" y1="82" x2="167" y2="270" stroke="#3a3050" stroke-width="1"/>
    <line x1="176" y1="82" x2="176" y2="270" stroke="#3a3050" stroke-width="1"/>

    <rect x="1096" y="70" width="34" height="200"/>
    <rect x="1086" y="60" width="54" height="12"/>
    <rect x="1086" y="270" width="54" height="12"/>
    <line x1="1104" y1="82" x2="1104" y2="270" stroke="#3a3050" stroke-width="1"/>
    <line x1="1113" y1="82" x2="1113" y2="270" stroke="#3a3050" stroke-width="1"/>
    <line x1="1122" y1="82" x2="1122" y2="270" stroke="#3a3050" stroke-width="1"/>
  </g>

  <!-- night sky + stars -->
  <g fill="#c9b98a">
    <circle cx="260" cy="60" r="1.4"/><circle cx="320" cy="90" r="1.2"/><circle cx="980" cy="55" r="1.4"/>
    <circle cx="1040" cy="100" r="1.2"/><circle cx="420" cy="50" r="1"/><circle cx="860" cy="80" r="1"/>
    <circle cx="500" cy="120" r="1.1"/><circle cx="780" cy="110" r="1.1"/>
  </g>

  <!-- moon glow behind figure -->
  <circle cx="640" cy="150" r="130" fill="url(#moonGlow)"/>
  <circle cx="640" cy="105" r="46" fill="#8a6d2f" opacity="0.85"/>

  <!-- Nyx figure: robe, wings, head, owl -->
  <path d="M640 130 L590 270 H690 Z" fill="url(#robeGrad)" stroke="#5a4a2a" stroke-width="1.5"/>
  <path d="M600 150 Q520 170 505 230 Q560 210 605 190 Z" fill="#1c1830" stroke="#5a4a2a" stroke-width="1.2"/>
  <path d="M680 150 Q760 170 775 230 Q720 210 675 190 Z" fill="#1c1830" stroke="#5a4a2a" stroke-width="1.2"/>
  <circle cx="640" cy="122" r="20" fill="#241f38" stroke="#8a6d2f" stroke-width="1.5"/>
  <path d="M622 108 A20 14 0 0 1 658 108" fill="none" stroke="#8a6d2f" stroke-width="2"/>
  <line x1="640" y1="140" x2="640" y2="255" stroke="#8a6d2f" stroke-width="2"/>
  <g fill="#8a6d2f">
    <ellipse cx="580" cy="250" rx="11" ry="13"/>
    <circle cx="575" cy="246" r="3" fill="#0a0e1a"/><circle cx="585" cy="246" r="3" fill="#0a0e1a"/>
  </g>

  <!-- title band -->
  <text x="640" y="308" text-anchor="middle" fill="#c9b98a" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" letter-spacing="10">NYX</text>
  <text x="640" y="332" text-anchor="middle" fill="#8a6d2f" font-family="Georgia, serif" font-size="14" letter-spacing="3">PRIVACY-FIRST ROUTER FOR RASPBERRY PI</text>

  <!-- bottom medallion row -->
  <g font-family="Georgia, serif" font-size="11" fill="#8a6d2f" text-anchor="middle">
    <g stroke="#8a6d2f" stroke-width="1.3" fill="none">
      <circle cx="420" cy="345" r="15"/>
      <circle cx="510" cy="345" r="15"/>
      <circle cx="600" cy="345" r="15"/>
      <circle cx="690" cy="345" r="15"/>
      <circle cx="780" cy="345" r="15"/>
    </g>
    <path d="M414 339 L420 351 L426 339" fill="none" stroke="#8a6d2f" stroke-width="1.5"/>
    <circle cx="510" cy="339" r="5.5" fill="none" stroke="#8a6d2f" stroke-width="1.3"/><circle cx="510" cy="345" r="2.2" fill="none" stroke="#8a6d2f" stroke-width="1"/>
    <rect x="594" y="340" width="12" height="11" rx="2" fill="none" stroke="#8a6d2f" stroke-width="1.3"/>
    <path d="M683 339 L697 339 V346 Q690 352 683 346 Z" fill="none" stroke="#8a6d2f" stroke-width="1.3"/>
    <path d="M773 337 A8 8 0 1 1 780 353" fill="none" stroke="#8a6d2f" stroke-width="1.3"/>
    <text x="420" y="368">VPN</text>
    <text x="510" y="368">TOR</text>
    <text x="600" y="368">PROXY</text>
    <text x="690" y="368">KILL SWITCH</text>
    <text x="780" y="368">ROTATE</text>
  </g>
</svg>
